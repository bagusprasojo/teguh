{% extends "base.html" %}
{% block title %}Voucher - Koready{% endblock %}
{% block content %}
<div class="mx-auto max-w-lg px-4 py-12">
  <h1 class="text-3xl font-black">Input Voucher</h1>
  {% if access.is_active %}<p class="mt-2 text-zinc-600">Akses aktif sampai {{ access.expires_at|date:"d M Y H:i" }}. Voucher baru akan menambah masa aktif.</p>{% endif %}
  <form method="post" class="form-card mt-6">{% csrf_token %}{{ form.as_p }}<button class="btn-primary w-full" type="submit">Gunakan Voucher</button></form>
</div>
{% endblock %}
