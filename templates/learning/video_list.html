{% extends "base.html" %}
{% block title %}Video - Koready{% endblock %}
{% block content %}
<section class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8"><h1 class="text-3xl font-black">Video Bahasa Korea</h1><div class="mt-6 grid gap-6 sm:grid-cols-2 lg:grid-cols-3">{% for video in videos %}<a href="{% url 'video_detail' video.uuid %}" class="card"><img src="{{ video.thumbnail_url }}" class="aspect-video w-full object-cover" alt="{{ video.title }}"><div class="p-4"><h2 class="font-black">{{ video.title }}</h2><p class="mt-2 line-clamp-2 text-sm text-zinc-600">{{ video.description }}</p></div></a>{% empty %}<p>Belum ada video.</p>{% endfor %}</div></section>
{% endblock %}
