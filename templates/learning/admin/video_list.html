{% extends "learning/admin/base_admin.html" %}
{% block admin_content %}<div class="mb-4"><a class="btn-primary" href="{% url 'admin_video_new' %}">Tambah Video</a></div><div class="table-card"><table><thead><tr><th>Judul</th><th>Status</th><th>YouTube</th><th></th></tr></thead><tbody>{% for video in videos %}<tr><td>{{ video.title }}</td><td>{{ video.is_active|yesno:"Aktif,Nonaktif" }}</td><td>{{ video.youtube_id }}</td><td><a class="nav-link" href="{% url 'admin_video_edit' video.pk %}">Edit</a></td></tr>{% endfor %}</tbody></table></div>{% endblock %}
