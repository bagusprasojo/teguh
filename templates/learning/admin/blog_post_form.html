{% extends "learning/admin/base_admin.html" %}
{% block admin_content %}
<div class="max-w-4xl">
  <h2 class="text-2xl font-black">{{ title }}</h2>
  <form method="post" enctype="multipart/form-data" class="form-card mt-5">
    {% csrf_token %}
    {{ form.media }}
    {{ form.as_p }}
    <div class="flex gap-3"><button class="btn-primary" type="submit">Simpan</button><a class="btn-muted" href="{% url 'admin_blog_post_list' %}">Batal</a></div>
  </form>
</div>
{% endblock %}
